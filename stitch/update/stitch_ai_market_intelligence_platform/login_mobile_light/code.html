<style>
        body {
            background-color: #f8f9fa; /* background */
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-top: 0.5px solid #B8860B;
            border-left: 1px solid #F1F3F5;
            border-right: 1px solid #F1F3F5;
            border-bottom: 1px solid #F1F3F5;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        .golden-glow:hover {
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.15);
        }
        input:focus {
            outline: none;
            border-color: #B8860B !important;
            box-shadow: 0 0 0 1px #B8860B !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center font-body-md text-body-md text-on-surface p-4 md:p-8 relative overflow-hidden">
<!-- Abstract Ambient Background Graphic -->
<div aria-hidden="true" class="absolute inset-0 z-0 pointer-events-none opacity-20">
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="40" id="grid" patternunits="userSpaceOnUse" width="40">
<path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d3c4af" stroke-width="0.5"></path>
</pattern>
</defs>
<rect fill="url(#grid)" height="100%" width="100%"></rect>
<circle cx="80%" cy="20%" fill="url(#glowGradient)" filter="blur(60px)" opacity="0.3" r="300"></circle>
<defs>
<radialgradient cx="50%" cy="50%" fx="50%" fy="50%" id="glowGradient" r="50%">
<stop offset="0%" stop-color="#f7bd48" stop-opacity="1"></stop>
<stop offset="100%" stop-color="#f8f9fa" stop-opacity="0"></stop>
</radialgradient>
</defs>
</svg>
</div>
<!-- Login Container -->
<main class="w-full max-w-md z-10">
<!-- Brand Header -->
<div class="text-center mb-10">
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary tracking-tighter mb-2">NEURAL RATES</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Institutional AI Intelligence</p>
</div>
<!-- Login Card (Glassmorphism) -->
<div class="glass-card rounded-xl p-8 w-full flex flex-col gap-6">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-1">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Secure authentication required to access terminal.</p>
</div>
<form class="flex flex-col gap-5">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Corporate Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-on-surface placeholder:text-tertiary-fixed-dim transition-colors" id="email" name="email" placeholder="user@institution.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Access Token</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Recover</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="key">key</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-10 font-body-md text-body-md text-on-surface placeholder:text-tertiary-fixed-dim transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Biometrics -->
<div class="flex items-center justify-between mt-2">
<label class="flex items-center gap-2 cursor-pointer">
<input class="rounded border-outline-variant text-primary focus:ring-primary w-4 h-4 bg-surface-container-lowest" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface-variant">Remember device</span>
</label>
<button aria-label="Use Biometrics" class="text-primary hover:text-on-primary-container bg-surface-container-low hover:bg-primary-container rounded-full p-2 transition-colors flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="button">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>
</button>
</div>
<!-- Submit Button -->
<button class="w-full bg-[#B8860B] hover:bg-primary text-on-primary font-headline-md text-headline-md text-[18px] py-4 rounded-lg mt-4 transition-all golden-glow flex justify-center items-center gap-2" type="submit">
                    Authenticate <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-4 pt-4 border-t border-outline-variant/50 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Require terminal access? <a class="text-primary font-medium hover:underline" href="#">Request Provisioning</a>
</p>
</div>
</div>
</main>
<!-- Footer Disclaimers -->
<footer class="mt-auto pt-8 pb-4 text-center z-10 w-full max-w-md">
<p class="font-label-sm text-label-sm text-on-surface-variant opacity-70">
            © 2024 Neural Rates AI. Secured by advanced encryption.
        </p>
</footer>
</body></html>
