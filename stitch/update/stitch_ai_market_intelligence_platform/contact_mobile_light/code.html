<!DOCTYPE html>

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid #B8860B;
            border-left: 0.5px solid #F1F3F5;
            border-right: 0.5px solid #F1F3F5;
            border-bottom: 0.5px solid #F1F3F5;
        }
        .golden-glow:active {
            box-shadow: 0 4px 20px rgba(184, 134, 11, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col pt-16 pb-24 md:pb-0 font-body-md text-body-md">
<!-- TopAppBar (from JSON) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-surface-container-high border-b border-outline-variant md:hidden">
<button class="text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-95 duration-100 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<span class="font-headline-md text-headline-md font-bold tracking-tighter text-primary">NEURAL RATES</span>
<button class="text-on-surface-variant hover:bg-surface-container-highest transition-colors active:scale-95 duration-100 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-[1200px] mx-auto px-4 md:px-margin-mobile flex flex-col gap-lg mt-8">
<!-- Header Section -->
<section class="flex flex-col gap-sm items-center text-center">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-background">Contact Us</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-md mx-auto">
                Connect with our advisory team for inquiries regarding AI indices and institutional access.
            </p>
</section>
<!-- Quick Actions -->
<section class="grid grid-cols-2 gap-sm">
<button class="glass-card flex flex-col items-center justify-center p-md rounded-xl golden-glow transition-all active:scale-95">
<span class="material-symbols-outlined text-primary mb-xs" data-icon="call">call</span>
<span class="font-label-sm text-label-sm text-on-surface">Phone Support</span>
</button>
<button class="glass-card flex flex-col items-center justify-center p-md rounded-xl golden-glow transition-all active:scale-95">
<span class="material-symbols-outlined text-primary mb-xs" data-icon="mail">mail</span>
<span class="font-label-sm text-label-sm text-on-surface">Email Inquiry</span>
</button>
</section>
<!-- Inquiry Form -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md">
<h2 class="font-headline-md text-headline-md text-on-surface mb-md">Direct Inquiry</h2>
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="name">Full Name</label>
<input class="bg-surface-container-lowest border border-surface-variant rounded-DEFAULT p-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="name" placeholder="John Doe" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Corporate Email</label>
<input class="bg-surface-container-lowest border border-surface-variant rounded-DEFAULT p-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email" placeholder="john@company.com" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="message">Message</label>
<textarea class="bg-surface-container-lowest border border-surface-variant rounded-DEFAULT p-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="message" placeholder="How can we assist you?" rows="4"></textarea>
</div>
<button class="bg-primary text-on-primary font-label-sm text-label-sm rounded-full py-sm px-gutter golden-glow transition-all active:scale-95 w-full mt-sm" type="button">
                    Submit Inquiry
                </button>
</form>
</section>
<!-- Global Hubs -->
<section class="flex flex-col gap-md">
<h3 class="font-headline-md text-headline-md text-on-surface border-b border-outline-variant pb-xs">Global Hubs</h3>
<div class="flex flex-col gap-sm">
<div class="bg-surface p-md rounded-lg border border-surface-variant flex justify-between items-center">
<div>
<h4 class="font-headline-md text-headline-md text-on-surface text-lg">New York</h4>
<p class="font-body-md text-body-md text-on-surface-variant text-sm mt-xs">Wall Street District</p>
</div>
<span class="material-symbols-outlined text-primary" data-icon="location_on">location_on</span>
</div>
<div class="bg-surface p-md rounded-lg border border-surface-variant flex justify-between items-center">
<div>
<h4 class="font-headline-md text-headline-md text-on-surface text-lg">London</h4>
<p class="font-body-md text-body-md text-on-surface-variant text-sm mt-xs">Canary Wharf</p>
</div>
<span class="material-symbols-outlined text-primary" data-icon="location_on">location_on</span>
</div>
<div class="bg-surface p-md rounded-lg border border-surface-variant flex justify-between items-center">
<div>
<h4 class="font-headline-md text-headline-md text-on-surface text-lg">Singapore</h4>
<p class="font-body-md text-body-md text-on-surface-variant text-sm mt-xs">Marina Bay Financial Centre</p>
</div>
<span class="material-symbols-outlined text-primary" data-icon="location_on">location_on</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar (from JSON) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-2 pb-4 pt-2 bg-surface-container border-t border-outline-variant md:hidden">
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
<span class="font-label-caps text-label-caps text-[10px]">Markets</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1" data-icon="newspaper">newspaper</span>
<span class="font-label-caps text-label-caps text-[10px]">News</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1" data-icon="calculate">calculate</span>
<span class="font-label-caps text-label-caps text-[10px]">Calculators</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined mb-1" data-icon="account_balance_wallet">account_balance_wallet</span>
<span class="font-label-caps text-label-caps text-[10px]">Portfolio</span>
</button>
</nav>
</body></html>
