<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Neural Rates - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&amp;family=Inter:wght@400;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#343439",
                    "error": "#ffb4ab",
                    "outline-variant": "#4a473e",
                    "surface-bright": "#38393d",
                    "inverse-primary": "#705d00",
                    "on-primary-container": "#776300",
                    "on-primary": "#3a3000",
                    "background": "#121317",
                    "on-secondary-container": "#b6b5b4",
                    "on-surface-variant": "#ccc6bb",
                    "on-tertiary": "#353029",
                    "on-secondary-fixed": "#1b1c1b",
                    "on-background": "#e3e2e7",
                    "primary-fixed": "#ffe16d",
                    "tertiary-fixed-dim": "#cec5bb",
                    "on-primary-fixed": "#221b00",
                    "on-secondary": "#303030",
                    "secondary-container": "#474746",
                    "on-error-container": "#ffdad6",
                    "primary": "#ffffff",
                    "tertiary-fixed": "#ebe1d6",
                    "on-primary-fixed-variant": "#544600",
                    "surface-dim": "#121317",
                    "surface-container-high": "#292a2e",
                    "on-tertiary-container": "#6a635b",
                    "primary-container": "#ffe16d",
                    "on-error": "#690005",
                    "on-surface": "#e3e2e7",
                    "inverse-on-surface": "#2f3035",
                    "tertiary": "#ffffff",
                    "primary-fixed-dim": "#e9c400",
                    "on-secondary-fixed-variant": "#474746",
                    "surface-container": "#1e1f24",
                    "secondary-fixed-dim": "#c8c6c5",
                    "surface": "#121317",
                    "surface-container-low": "#1a1b20",
                    "error-container": "#93000a",
                    "inverse-surface": "#e3e2e7",
                    "secondary": "#c8c6c5",
                    "on-tertiary-fixed": "#1f1b15",
                    "tertiary-container": "#ebe1d6",
                    "secondary-fixed": "#e4e2e1",
                    "on-tertiary-fixed-variant": "#4b463e",
                    "outline": "#999077",
                    "surface-container-lowest": "#0d0e12",
                    "surface-tint": "#e9c400",
                    "surface-container-highest": "#343439"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "24px",
                    "margin-mobile": "16px",
                    "margin-desktop": "40px",
                    "base-unit": "4px",
                    "unit": "4px",
                    "container-max": "1440px"
            },
            "fontFamily": {
                    "display-lg": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "display-lg-mobile": ["Manrope"],
                    "data-mono": ["JetBrains Mono"],
                    "body-lg": ["Inter"],
                    "label-caps": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                    "display-lg-mobile": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "data-mono": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                    "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                    "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700" }],
                    "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
            }
          }
        }
      }
    </script>
<style>
        .gold-glow:focus-within {
            box-shadow: 0 4px 12px -2px rgba(255, 225, 109, 0.15);
        }
        
        .bg-ambient-radial {
            background: radial-gradient(circle at 50% 0%, rgba(255, 225, 109, 0.05) 0%, rgba(18, 19, 23, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased overflow-x-hidden">
<!-- Atmospheric Background -->
<div class="fixed inset-0 bg-ambient-radial pointer-events-none z-0"></div>
<!-- Main Content Canvas (Navigation Suppressed per Semantic Shell Mandate for Transactional pages) -->
<main class="flex-1 flex flex-col justify-center px-margin-mobile py-8 relative z-10 w-full max-w-md mx-auto">
<!-- Brand Header -->
<header class="flex flex-col items-center mb-12 text-center">
<div class="w-16 h-16 rounded-2xl bg-surface-container flex items-center justify-center mb-6 shadow-lg border border-outline-variant">
<span class="material-symbols-outlined text-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tighter mb-2">NEURAL RATES</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Access the Terminal</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-8 w-full" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-2 gold-glow transition-all duration-300 rounded-t-lg bg-surface-container-low px-4 pt-3 pb-1 border-b-2 border-outline-variant focus-within:border-primary-container focus-within:bg-surface-container">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="email">Institutional Email</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant text-xl">mail</span>
<input autocomplete="email" class="w-full bg-transparent border-none p-0 text-on-surface font-data-mono text-data-mono focus:ring-0 placeholder:text-on-surface-variant/50" id="email" placeholder="user@fund.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2 gold-glow transition-all duration-300 rounded-t-lg bg-surface-container-low px-4 pt-3 pb-1 border-b-2 border-outline-variant focus-within:border-primary-container focus-within:bg-surface-container">
<div class="flex justify-between items-center w-full">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Terminal Password</label>
<a class="font-label-caps text-label-caps text-primary-fixed hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant text-xl">key</span>
<input autocomplete="current-password" class="w-full bg-transparent border-none p-0 text-on-surface font-data-mono text-data-mono focus:ring-0 placeholder:text-on-surface-variant/50 tracking-widest" id="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Action Area -->
<div class="flex flex-col gap-6 mt-4">
<button class="w-full py-4 rounded-full bg-primary-container text-on-primary-container font-headline-md text-headline-md shadow-lg active:scale-95 transition-all duration-200 hover:bg-primary-fixed hover:shadow-[0_0_20px_rgba(255,225,109,0.3)] flex items-center justify-center gap-2" type="submit">
<span>Authenticate</span>
<span class="material-symbols-outlined text-on-primary-container">arrow_forward</span>
</button>
<div class="text-center">
<span class="font-body-md text-body-md text-on-surface-variant">No access provisioned?</span>
<a class="font-body-md text-body-md text-primary-container hover:text-primary transition-colors ml-1" href="#">Request Authorization</a>
</div>
</div>
</form>
<!-- Secure Badge -->
<div class="mt-16 flex items-center justify-center gap-2 text-on-surface-variant opacity-60">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="font-label-caps text-label-caps">256-BIT ENCRYPTED SESSION</span>
</div>
</main>
</body></html>
