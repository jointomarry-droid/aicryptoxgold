<style>

<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<div class="ambient-glow"></div>
<div class="w-full max-w-[500px] px-margin-mobile md:px-0 z-10">
<!-- Brand Header -->
<div class="flex justify-center mb-10">
<h1 class="font-display-lg text-display-lg text-primary-fixed tracking-tighter">AUREUS</h1>
</div>
<!-- Glassmorphic Card -->
<div class="glass-card rounded-xl p-8 md:p-10 flex flex-col items-center w-full relative overflow-hidden">
<!-- Subtle accent top line -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-primary-container to-transparent opacity-50"></div>
<div class="mb-8 text-center">
<div class="w-16 h-16 bg-surface-container-low rounded-full flex items-center justify-center mx-auto mb-6 border border-outline-variant/30">
<span class="material-symbols-outlined text-primary-fixed text-3xl" style="font-variation-settings: 'FILL' 1;">enhanced_encryption</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Security Verification</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-sm mx-auto">
                    Enter the 6-digit code from your authenticator app to access the terminal.
                </p>
</div>
<!-- Input Fields -->
<div class="flex gap-2 md:gap-3 mb-10 justify-center w-full" id="otp-container">
<input autocomplete="off" class="code-input w-12 h-14 md:w-14 md:h-16 bg-surface-container-low border-0 border-b-2 border-outline-variant text-center font-data-mono text-headline-md text-on-surface transition-all duration-200" maxlength="1" type="text"/>
<input autocomplete="off" class="code-input w-12 h-14 md:w-14 md:h-16 bg-surface-container-low border-0 border-b-2 border-outline-variant text-center font-data-mono text-headline-md text-on-surface transition-all duration-200" maxlength="1" type="text"/>
<input autocomplete="off" class="code-input w-12 h-14 md:w-14 md:h-16 bg-surface-container-low border-0 border-b-2 border-outline-variant text-center font-data-mono text-headline-md text-on-surface transition-all duration-200" maxlength="1" type="text"/>
<input autocomplete="off" class="code-input w-12 h-14 md:w-14 md:h-16 bg-surface-container-low border-0 border-b-2 border-outline-variant text-center font-data-mono text-headline-md text-on-surface transition-all duration-200" maxlength="1" type="text"/>
<input autocomplete="off" class="code-input w-12 h-14 md:w-14 md:h-16 bg-surface-container-low border-0 border-b-2 border-outline-variant text-center font-data-mono text-headline-md text-on-surface transition-all duration-200" maxlength="1" type="text"/>
<input autocomplete="off" class="code-input w-12 h-14 md:w-14 md:h-16 bg-surface-container-low border-0 border-b-2 border-outline-variant text-center font-data-mono text-headline-md text-on-surface transition-all duration-200" maxlength="1" type="text"/>
</div>
<!-- Primary Action -->
<button class="w-full h-12 rounded-lg bg-gradient-to-r from-primary-fixed to-primary-fixed-dim text-on-primary-fixed font-headline-md text-body-md font-bold hover:opacity-90 transition-opacity duration-200 mb-6 flex items-center justify-center gap-2">
                Verify &amp; Access
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Secondary Actions -->
<div class="flex flex-col gap-4 w-full items-center">

                    Resend Code

</div>
<div class="w-[1px] h-4 bg-outline-variant"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline text-[16px]">verified_user</span>
<span class="font-label-caps text-label-caps text-outline">SECURE SESSION</span>
</div>
</div>
</div>
<script>
        // Simple auto-advance for OTP inputs
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.code-input');
            
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length === 1) {
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });

            // Focus first input on load
            if (inputs.length > 0) {
                inputs[0].focus();
            }
        });
    </script>
