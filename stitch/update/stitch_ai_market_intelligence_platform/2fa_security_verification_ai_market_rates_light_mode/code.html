<style>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased relative overflow-hidden">
<!-- Subtle Grid Background -->
<div class="absolute inset-0 grid-bg opacity-30 z-0 pointer-events-none"></div>
<!-- Navigation Shell (TopAppBar) - Suppressed as per instructions for transactional/linear screens -->
<main class="flex-grow flex items-center justify-center relative z-10 px-margin-desktop px-4 py-lg">
<div class="glass-panel rounded-xl w-full max-w-md p-lg flex flex-col items-center border border-outline-variant/30">
<!-- Brand Logo Mark (Simplified for this context) -->
<div class="mb-gutter text-primary flex justify-center items-center">
<span class="material-symbols-outlined text-[48px] font-light">

                 </span>
</div>
<!-- Headers -->
<div class="text-center mb-margin">
<h1 class="font-headline-md text-headline-md text-on-surface mb-base">Two-Step Verification</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Verification required for institutional access.</p>
</div>
<!-- Notification/Instruction Context -->
<div class="bg-surface-container-low rounded p-base mb-gutter w-full border border-surface-variant flex items-start gap-sm">
<span class="material-symbols-outlined text-primary-container shrink-0 mt-xs">
                    info
                </span>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">
                    Enter the 6-digit code from your authenticator app or security token.
                </p>
</div>
<!-- Input Area -->
<form class="w-full flex flex-col items-center">
<div class="flex justify-between w-full gap-xs mb-margin" id="otp-container">
<input aria-label="Digit 1" class="digit-input rounded-DEFAULT font-label-sm font-bold text-on-surface" maxlength="1" placeholder="•" type="number"/>
<input aria-label="Digit 2" class="digit-input rounded-DEFAULT font-label-sm font-bold text-on-surface" maxlength="1" placeholder="•" type="number"/>
<input aria-label="Digit 3" class="digit-input rounded-DEFAULT font-label-sm font-bold text-on-surface" maxlength="1" placeholder="•" type="number"/>
<input aria-label="Digit 4" class="digit-input rounded-DEFAULT font-label-sm font-bold text-on-surface" maxlength="1" placeholder="•" type="number"/>
<input aria-label="Digit 5" class="digit-input rounded-DEFAULT font-label-sm font-bold text-on-surface" maxlength="1" placeholder="•" type="number"/>
<input aria-label="Digit 6" class="digit-input rounded-DEFAULT font-label-sm font-bold text-on-surface" maxlength="1" placeholder="•" type="number"/>
</div>
<!-- Primary Action -->
<button class="w-full bg-[#B8860B] hover:bg-[#986d00] text-on-primary font-body-md font-medium py-md px-lg rounded-DEFAULT transition-colors duration-200 btn-glow flex justify-center items-center gap-xs" type="button">

                        lock_open

                    Try another way
                </button>

</main>
<script>
        // Simple script to handle OTP input focus and advancement
        const inputs = document.querySelectorAll('.digit-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1); // Keep only first digit
                }
                if (e.target.value !== '' && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
            
            // Allow paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text/plain').replace(/\D/g, '').slice(0, 6);
                for (let i = 0; i < pastedData.length; i++) {
                    if (inputs[i]) {
                        inputs[i].value = pastedData[i];
                    }
                }
                if (pastedData.length > 0) {
                    inputs[Math.min(pastedData.length, inputs.length - 1)].focus();
                }
            });
        });
    </script>
