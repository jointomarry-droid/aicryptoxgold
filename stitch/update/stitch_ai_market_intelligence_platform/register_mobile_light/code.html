<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registration - Aureus Light</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#986d00",
                        "on-primary-container": "#fffbff",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-surface": "#191c1d",
                        "inverse-on-surface": "#f0f1f2",
                        "on-surface-variant": "#4f4535",
                        "background": "#f8f9fa",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#221b00",
                        "on-secondary-fixed-variant": "#544600",
                        "primary-fixed-dim": "#f7bd48",
                        "tertiary": "#5b5c60",
                        "on-secondary-container": "#6e5c00",
                        "primary": "#785600",
                        "surface-dim": "#d9dadb",
                        "surface-container-high": "#e7e8e9",
                        "outline-variant": "#d3c4af",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#e3e2e7",
                        "surface-variant": "#e1e3e4",
                        "on-primary-fixed-variant": "#5d4200",
                        "on-tertiary-container": "#fefcff",
                        "inverse-primary": "#f7bd48",
                        "on-tertiary-fixed": "#1a1b20",
                        "tertiary-fixed-dim": "#c7c6cb",
                        "on-primary-fixed": "#271900",
                        "outline": "#817563",
                        "on-tertiary-fixed-variant": "#46464b",
                        "tertiary-container": "#747479",
                        "secondary-fixed": "#ffe16d",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#7b5800",
                        "surface-container-highest": "#e1e3e4",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#fcd400",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#e9c400",
                        "on-background": "#191c1d",
                        "surface-container": "#edeeef",
                        "surface-container-low": "#f3f4f5",
                        "surface-bright": "#f8f9fa",
                        "primary-fixed": "#ffdea6",
                        "surface": "#f8f9fa",
                        "secondary": "#705d00",
                        "inverse-surface": "#2e3132",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin": "32px",
                        "md": "24px",
                        "lg": "48px",
                        "base": "8px",
                        "sm": "12px",
                        "gutter": "24px",
                        "xl": "80px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "display-lg": ["manrope"],
                        "headline-md": ["manrope"],
                        "display-lg-mobile": ["manrope"],
                        "body-lg": ["inter"],
                        "label-sm": ["jetbrainsMono"],
                        "body-md": ["inter"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "display-lg-mobile": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(184, 134, 11, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.5);
        }
        .golden-glow:hover {
            box-shadow: 0 8px 24px -4px rgba(184, 134, 11, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-bright text-on-background font-body-md antialiased min-h-screen flex flex-col overflow-x-hidden">
<!-- Decorative Aureus Background Elements -->
<div class="fixed top-0 right-0 w-96 h-96 bg-primary-container opacity-5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-64 h-64 bg-primary opacity-5 rounded-full blur-2xl translate-y-1/3 -translate-x-1/4 pointer-events-none"></div>
<!-- Minimal Header (Transactional, Nav Shell Suppressed) -->
<header class="w-full px-4 pt-6 pb-2 flex items-center justify-between z-10 relative">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-on-surface">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-headline-md text-headline-md font-bold tracking-tighter text-primary">NEURAL RATES</span>
<div class="w-10 h-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-4 pt-8 pb-12 flex flex-col z-10 relative">
<!-- Hero Title -->
<div class="mb-10">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-2">Create Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join the premium terminal experience.</p>
</div>
<!-- Glassmorphism Form Container -->
<div class="glass-panel rounded-xl p-6 shadow-sm flex-1 flex flex-col gap-6">
<!-- Input Fields -->
<div class="flex flex-col gap-5">
<!-- Name Field -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant" data-icon="person">person</span>
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-lg py-3 pl-10 pr-4 font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="fullName" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-lg py-3 pl-10 pr-4 font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-lg py-3 pl-10 pr-10 font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<div class="mt-auto pt-6 flex flex-col gap-4">
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-body-md py-4 rounded-xl golden-glow transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    Create Account
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Secondary Action -->
<p class="text-center font-body-md text-on-surface-variant text-sm mt-2">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
</div>
</div>
</main>
</body></html>
